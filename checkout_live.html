    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Celzimo Veste - Próximamente</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
        <style>
            :root {
                --color-bg-dark: #0d0c0b;
                --color-bg-light: #161413;
                --color-gold: #c5a880;
                --color-text-main: #f5f4f0;
                --color-text-muted: #a69f96;
                --font-primary: 'Inter', sans-serif;
                --font-secondary: 'Playfair Display', serif;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: radial-gradient(circle at center, var(--color-bg-light) 0%, var(--color-bg-dark) 100%);
                color: var(--color-text-main);
                font-family: var(--font-primary);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 2rem 1rem;
                overflow-x: hidden;
            }

            .container {
                max-width: 600px;
                width: 100%;
                text-align: center;
                animation: fadeIn 1s ease-out;
            }

            .badge {
                display: inline-block;
                border: 1px solid var(--color-gold);
                color: var(--color-gold);
                padding: 0.35rem 1rem;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.2em;
                border-radius: 50px;
                margin-bottom: 2rem;
                font-weight: 500;
                background-color: rgba(197, 168, 128, 0.05);
            }

            .image-card {
                position: relative;
                width: 100%;
                max-width: 480px;
                margin: 0 auto 2.5rem;
                border-radius: 16px;
                padding: 12px;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
                backdrop-filter: blur(10px);
                transition: transform 0.4s ease, box-shadow 0.4s ease;
            }

            .image-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 25px 50px rgba(197, 168, 128, 0.15);
            }

            .image-card img {
                width: 100%;
                height: auto;
                border-radius: 10px;
                display: block;
                border: 1px solid rgba(197, 168, 128, 0.15);
            }

            .title {
                font-family: var(--font-secondary);
                font-size: 2.2rem;
                font-weight: 400;
                line-height: 1.3;
                margin-bottom: 1rem;
                letter-spacing: 0.02em;
            }

            .title em {
                font-family: var(--font-secondary);
                font-style: italic;
                color: var(--color-gold);
            }

            .description {
                font-size: 0.95rem;
                color: var(--color-text-muted);
                line-height: 1.6;
                max-width: 460px;
                margin: 0 auto 2.5rem;
                font-weight: 300;
            }

            .divider {
                width: 40px;
                height: 1px;
                background-color: var(--color-gold);
                margin: 0 auto 2rem;
            }

            .social-links {
                display: flex;
                justify-content: center;
                gap: 1.5rem;
                margin-bottom: 3rem;
            }

            .social-link {
                color: var(--color-text-main);
                text-decoration: none;
                font-size: 1.5rem;
                transition: color 0.3s ease, transform 0.3s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 45px;
                height: 45px;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }

            .social-link:hover {
                color: var(--color-gold);
                transform: scale(1.1);
                background-color: rgba(197, 168, 128, 0.1);
                border-color: var(--color-gold);
            }

            .footer-text {
                font-size: 0.75rem;
                color: var(--color-text-muted);
                letter-spacing: 0.05em;
                opacity: 0.6;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @media (max-width: 480px) {
                .title {
                    font-size: 1.8rem;
                }
                .description {
                    font-size: 0.9rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <span class="badge">Próximamente</span>
            
            <div class="image-card">
                <img src="https://celzimoveste.cl/wp-content/themes/celzimo-theme/assets/coming-soon.jpg" alt="Celzimo Veste">
            </div>

            <h1 class="title">Diseñando la elegancia <em>a tu medida</em></h1>
            <p class="description">Estamos preparando una experiencia exclusiva de alta costura y sastrería de lujo. Muy pronto revelaremos nuestra nueva colección.</p>
            
            <div class="divider"></div>

            <div class="social-links">
                <a href="https://www.instagram.com/celzimo_veste/" class="social-link" title="Síguenos en Instagram" target="_blank" rel="noopener">
                    <i class="ti ti-brand-instagram"></i>
                </a>
                <a href="mailto:contacto@celzimoveste.cl" class="social-link" title="Escríbenos por correo">
                    <i class="ti ti-mail"></i>
                </a>
            </div>

            <p class="footer-text">&copy; 2026 CELZIMO VESTE. TODOS LOS DERECHOS RESERVADOS.</p>
        </div>
    </body>
    </html>
